services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: devops-demo-app
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: mysql
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: laravel
      DB_USERNAME: laravel
      DB_PASSWORD: laravel
    ports:
      - "8080:8000"
    volumes:
      - ./:/var/www/html
      - vendor_data:/var/www/html/vendor

  db:
    image: mariadb:11.4
    container_name: devops-demo-db
    restart: unless-stopped
    environment:
      MARIADB_DATABASE: laravel
      MARIADB_USER: laravel
      MARIADB_PASSWORD: laravel
      MARIADB_ROOT_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

volumes:
  db_data:
  vendor_data:
